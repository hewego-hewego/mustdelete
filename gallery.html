<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 초콜릿 & 아이스크림 갤러리</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            transition: background 0.5s ease;
            background: linear-gradient(135deg, #4b2e2e, #8b5a2b);
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            padding: 26px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            width: 440px;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mode-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .mode-btn.active {
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }

        h1 {
            margin: 8px 0 6px 0;
        }

        h2 {
            margin-top: 8px;
            color: #5c3a21;
        }

        img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 14px;
            margin-top: 14px;
            transition: 0.3s;
        }

        p {
            color: #555;
        }

        #actionButton {
            margin-top: 18px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background-color: #5c3a21;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        #actionButton:hover {
            transform: scale(1.03);
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: 0.2s;
            display: inline-block;
        }

        .home-btn:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>

<body>

    <a id="homeButton" href="index.html" class="home-btn">← 메인화면</a>

    <div class="container">
        <div class="mode-buttons">
            <button id="chocoModeBtn" class="mode-btn active" onclick="setMode('chocolate')">초콜릿 모드</button>
            <button id="iceModeBtn" class="mode-btn" onclick="setMode('icecream')">아이스크림 모드</button>
        </div>

        <h1 id="mainHeading">🍫 랜덤 초콜릿</h1>

        <img id="mainImage"
            src="https://images.unsplash.com/photo-1511381939415-e44015466834?q=80&w=1200&auto=format&fit=crop"
            alt="대표 이미지">

        <h2 id="mainTitle">밀크 초콜릿</h2>
        <p id="mainDesc">부드럽고 달콤한 클래식 초콜릿</p>

        <button id="actionButton" onclick="handleAction()">초콜릿 뽑기</button>
    </div>

    <script src="lang.js"></script>
    <script>
        const translations = {
            pageTitle: { ko: '랜덤 초콜릿 & 아이스크림 갤러리', en: 'Random Chocolate & Ice Cream Gallery' },
            headingChocolate: { ko: '🍫 랜덤 초콜릿', en: '🍫 Random Chocolate' },
            headingIcecream: { ko: '🍨 랜덤 아이스크림', en: '🍨 Random Ice Cream' },
            modeChocolate: { ko: '초콜릿 모드', en: 'Chocolate Mode' },
            modeIcecream: { ko: '아이스크림 모드', en: 'Ice Cream Mode' },
            actionChocolate: { ko: '초콜릿 뽑기', en: 'Pick Chocolate' },
            actionIcecream: { ko: '아이스크림 뽑기', en: 'Pick Ice Cream' },
            homeButton: { ko: '← 메인화면', en: '← Home' }
        };

        const chocolates = [
            {
                title: '밀크 초콜릿',
                titleEn: 'Milk Chocolate',
                desc: '부드럽고 달콤한 클래식 초콜릿',
                descEn: 'Soft and sweet classic chocolate',
                image: 'https://images.unsplash.com/photo-1549007994-cb92caebd54b?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #5c3a21, #c69c6d)'
            },
            {
                title: '다크 초콜릿',
                titleEn: 'Dark Chocolate',
                desc: '진한 카카오의 깊은 풍미',
                descEn: 'Rich cocoa with deep flavor',
                image: 'https://images.unsplash.com/photo-1511381939415-e44015466834?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #1e1e1e, #4b2e2e)'
            },
            {
                title: '화이트 초콜릿',
                titleEn: 'White Chocolate',
                desc: '부드럽고 크리미한 달콤함',
                descEn: 'Smooth and creamy sweetness',
                image: 'https://images.unsplash.com/photo-1548907040-4baa42d10919?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #fff3d6, #f7d9aa)'
            },
            {
                title: '딸기 초콜릿',
                titleEn: 'Strawberry Chocolate',
                desc: '상큼한 딸기와 달콤한 초콜릿의 조화',
                descEn: 'A tangy strawberry and sweet chocolate blend',
                image: 'https://images.unsplash.com/photo-1464306076886-da185f6a9d05?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #ff7aa2, #ffd1dc)'
            },
            {
                title: '민트 초콜릿',
                titleEn: 'Mint Chocolate',
                desc: '시원하고 달콤한 민트 향',
                descEn: 'Cool and sweet mint flavor',
                image: 'https://images.unsplash.com/photo-1571506165871-ee72a35bc9d4?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #3eb489, #b8f2e6)'
            }
        ];

        const icecreams = [
            {
                title: '스트로베리 아이스크림',
                titleEn: 'Strawberry Ice Cream',
                desc: '상큼한 딸기맛 아이스크림',
                descEn: 'Tangy strawberry flavored ice cream',
                image: 'https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #ffd1dc, #ff7aa2)'
            },
            {
                title: '바닐라 아이스크림',
                titleEn: 'Vanilla Ice Cream',
                desc: '부드럽고 클래식한 바닐라',
                descEn: 'Smooth and classic vanilla',
                image: 'https://images.unsplash.com/photo-1570197788417-0e82375c9371?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #fff8e7, #f3e4c7)'
            },
            {
                title: '초코 아이스크림',
                titleEn: 'Chocolate Ice Cream',
                desc: '진한 초콜릿 아이스크림',
                descEn: 'Rich chocolate ice cream',
                image: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #4b2e2e, #c69c6d)'
            },
            {
                title: '말차 아이스크림',
                titleEn: 'Matcha Ice Cream',
                desc: '부드럽고 쌉쌀한 말차 풍미',
                descEn: 'Smooth and slightly bitter matcha flavor',
                image: 'https://images.unsplash.com/photo-1517093157656-b9eccef91cb1?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #9dbf9e, #dff0e0)'
            },
            {
                title: '블루베리 소르베',
                titleEn: 'Blueberry Sorbet',
                desc: '상큼한 블루베리 소르베',
                descEn: 'Refreshing blueberry sorbet',
                image: 'https://images.unsplash.com/photo-1488900128323-21503983a07e?q=80&w=1200&auto=format&fit=crop',
                background: 'linear-gradient(135deg, #a0c4ff, #bdb2ff)'
            }
        ];

        let currentMode = 'chocolate';
        let currentLang = 'ko';

        function localizeItem(item, key) {
            return currentLang === 'en' && item[`${key}En`] ? item[`${key}En`] : item[key];
        }

        function applyChocolate(item) {
            document.getElementById('mainImage').src = item.image;
            document.getElementById('mainImage').alt = currentLang === 'en' ? 'Representative image' : '대표 이미지';
            document.getElementById('mainTitle').textContent = localizeItem(item, 'title');
            document.getElementById('mainDesc').textContent = localizeItem(item, 'desc');
            document.body.style.background = item.background;
        }

        function applyIcecream(item) {
            document.getElementById('mainImage').src = item.image;
            document.getElementById('mainImage').alt = currentLang === 'en' ? 'Representative image' : '대표 이미지';
            document.getElementById('mainTitle').textContent = localizeItem(item, 'title');
            document.getElementById('mainDesc').textContent = localizeItem(item, 'desc');
            document.body.style.background = item.background;
        }

        function renderModeLabels() {
            document.getElementById('chocoModeBtn').textContent = translations.modeChocolate[currentLang];
            document.getElementById('iceModeBtn').textContent = translations.modeIcecream[currentLang];
            document.getElementById('actionButton').textContent = currentMode === 'chocolate' ? translations.actionChocolate[currentLang] : translations.actionIcecream[currentLang];
            document.getElementById('mainHeading').textContent = currentMode === 'chocolate' ? translations.headingChocolate[currentLang] : translations.headingIcecream[currentLang];
            document.getElementById('homeButton').textContent = translations.homeButton[currentLang];
            document.title = translations.pageTitle[currentLang];
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('chocoModeBtn').classList.toggle('active', mode === 'chocolate');
            document.getElementById('iceModeBtn').classList.toggle('active', mode === 'icecream');

            if (mode === 'chocolate') {
                applyChocolate(chocolates[0]);
            } else {
                applyIcecream(icecreams[0]);
            }
            renderModeLabels();
        }

        function handleAction() {
            if (currentMode === 'chocolate') {
                const idx = Math.floor(Math.random() * chocolates.length);
                applyChocolate(chocolates[idx]);
            } else {
                const idx = Math.floor(Math.random() * icecreams.length);
                applyIcecream(icecreams[idx]);
            }
        }

        function applyPageLanguage(lang) {
            currentLang = lang;
            renderModeLabels();
            if (currentMode === 'chocolate') {
                applyChocolate(chocolates[0]);
            } else {
                applyIcecream(icecreams[0]);
            }
        }

        initLanguagePage();
    </script>
</body>
</html>
