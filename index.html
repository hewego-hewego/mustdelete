<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초콜릿 & 아이스크림 갤러리</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .main-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #333;
        }

        .subtitle {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .main-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .gallery-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .gallery-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .gallery-btn:active {
            transform: translateY(-1px);
        }

        .info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
            color: #888;
            font-size: 14px;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 2;
        }

        .lang-btn {
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background: #333;
            color: #fff;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="lang-switch">
        <button id="koBtn" class="lang-btn" type="button">한국어</button>
        <button id="enBtn" class="lang-btn" type="button">English</button>
    </div>

    <div class="main-container">
        <span class="emoji">🍫🍨</span>
        <h1 id="mainHeading">갤러리에 오신 것을 환영합니다!</h1>
        <p id="subtitle" class="subtitle">랜덤 초콜릿과 아이스크림을 발견해보세요</p>
        
        <div class="button-group">
            <a id="galleryButton" href="gallery.html" class="main-btn gallery-btn">갤러리 보러 가기</a>
            <a id="gameButton" href="chocolate_game.html" class="main-btn gallery-btn">초콜릿 제조 게임</a>
        </div>

        <div class="info">
            <p id="infoText">다양한 초콜릿과 아이스크림 중에서<br>매번 다른 상품을 랜덤으로 만나보세요!</p>
        </div>
    </div>

    <script src="./lang.js"></script>
    <script>
        const indexTranslations = {
            title: { ko: '초콜릿 & 아이스크림 갤러리', en: 'Chocolate & Ice Cream Gallery' },
            heading: { ko: '갤러리에 오신 것을 환영합니다!', en: 'Welcome to the Gallery!' },
            subtitle: { ko: '랜덤 초콜릿과 아이스크림을 발견해보세요', en: 'Discover random chocolates and ice cream' },
            galleryButton: { ko: '갤러리 보러 가기', en: 'Go to Gallery' },
            gameButton: { ko: '초콜릿 제조 게임', en: 'Chocolate Maker Game' },
            infoText: { ko: '다양한 초콜릿과 아이스크림 중에서<br>매번 다른 상품을 랜덤으로 만나보세요!', en: 'Explore a variety of chocolates and ice creams and find something new every time!' }
        };

        function applyPageLanguage(lang) {
            document.title = indexTranslations.title[lang];
            document.getElementById('mainHeading').textContent = indexTranslations.heading[lang];
            document.getElementById('subtitle').textContent = indexTranslations.subtitle[lang];
            document.getElementById('galleryButton').textContent = indexTranslations.galleryButton[lang];
            document.getElementById('gameButton').textContent = indexTranslations.gameButton[lang];
            document.getElementById('infoText').innerHTML = indexTranslations.infoText[lang];
            applyLangButtonState(lang);
        }

        document.getElementById('koBtn').addEventListener('click', () => handleLanguageButton('ko'));
        document.getElementById('enBtn').addEventListener('click', () => handleLanguageButton('en'));

        if (typeof initLanguagePage === 'function') initLanguagePage();
    </script>
</body>

</html>
